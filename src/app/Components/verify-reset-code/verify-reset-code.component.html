<div class="card shadow p-4 w-75 mx-auto my-5">
      <div *ngIf="apiErrorMessage"  class="alert alert-danger alert-dismissible fade show text-center">
        <p>{{apiErrorMessage}}</p>
    </div>
    <h4 class="text-center mb-4">Verify Reset Code</h4>

    <form (ngSubmit)="handleVerifyResetCode()" [formGroup]="verifyResetCodeForm">

      
        <div class="mb-3">
            <label for="resetCode" class="form-label">Reset Code</label>
            <input formControlName="resetCode" id="resetCode" type="test" class="form-control">
            <div *ngIf="resetCode?.touched &&  resetCode?.invalid" class="text-danger">
                <p *ngIf="resetCode?.getError('required')" class="my-0">Reset Code Is Required</p>
            </div>
        </div>


        <button [disabled]="verifyResetCodeForm.invalid ||isLoading" type="submit" class="btn bg-main text-light w-100">
          <samp *ngIf="!isLoading">Send</samp>
             <samp *ngIf="isLoading" class="fa-solid fa-spinner fa-spin"></samp>
        </button>

    </form>

   

</div>
