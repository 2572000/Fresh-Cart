<app-loading [isLoading]="isLoading"></app-loading>
<div class="container">
    <div class="row g-4">
    <h3 class="fw-bold mb-4 text-center section-title">
        All Brands
    </h3>
    <div class="col-6 col-md-4 col-lg-3" *ngFor="let brand of brands">
        <div class="brand-card" [routerLink]="['/products']" [queryParams]="{ brand: brand._id}">

            <img [src]="brand.image" [alt]="brand.name" class="brand-img">

            <div class="overlay">
                <h5>{{ brand.name }}</h5>
            </div>

        </div>

    </div>

</div>
</div>
