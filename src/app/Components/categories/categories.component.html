<app-loading [isLoading]="isLoading"></app-loading>
<div class="container">
  <div class="row g-4">
    <h3 class="fw-bold mb-4 text-center section-title">
    All Categories
  </h3>
    <div class="col-6 col-md-4 col-lg-3"
         *ngFor="let category of categories">
      <div class="category-card" [routerLink]="['/products']" 
        [queryParams]="{ category: category._id}" >

        <img [src]="category.image"
             [alt]="category.name"
             class="category-img">

        <div class="overlay">
          <h5>{{ category.name }}</h5>
        </div>

      </div>

    </div>

  </div>

</div>
